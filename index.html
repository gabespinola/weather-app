<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsão do tempo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div id="container">
        <form id="search">
        <i class="fa-solid fa-location-dot"></i>
        
        <input type="search" name="city_name" id="city_name" placeholder="Buscar cidade">
       
        <button type="submit">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
        </form>
        <div id="weather">
            <h1 id="title">Rolante,BR</h1>

            <div id="infos">
                <div id="temp">
                    <img id="temp_img" src="http://openweathermap.org/img/wn/04d@2x.png" alt="">
                    <div>
                     <p id="temp_value">
                        32 <sup>c°</sup>
                     </p>   
                     <p id="temp_description">
                        ensolarado
                     </p>
                    </div>
                    
                </div>

                <div id="other_infos">
                    <div class="info">
                      <i id="temp_max_icon" class="fa-solid fa-temperature-high"></i>  

                      <div>
                        <h2>temp. max</h2>
                        
                        <p id="temp_max">
                             32 <sup>c°</sup>
                        </p>
                      </div>
                    </div>

                     <div class="info">
                      <i id="temp_min_icon" class="fa-solid fa-temperature-low"></i>  

                      <div>
                        <h2>temp. min</h2>
                        
                        <p id="temp_min">
                             12 <sup>c°</sup>
                        </p>
                      </div>
                    </div>

                    <div class="info">
                      <i id="humidity" class="fa-solid fa-droplet"></i></i>

                      <div>
                        <h2>humidade</h2>
                        
                        <p id="humidity">
                          50%
                         </p>
                      </div>
                    </div>

                    <div class="info">
                      <i id="wind_icon" class="fa-solid fa-wind"></i></i>

                      <div>
                        <h2>Velocidade do vento</h2>
                        
                        <p id="wind">
                          10 km/h
                         </p>
                      </div>
                    </div>

                    
                </div>
            </div>

        </div>
        <div id="alert">

        </div>
    </div>
</body>
</html>
